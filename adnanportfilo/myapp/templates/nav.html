
           <!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Python + Django Developer </title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            color: #e0e0e0;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(15, 32, 39, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 0;
            z-index: 1000;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.3);
        }

        nav .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5em;
            font-weight: bold;
            color: #44a08d;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 40px;
        }

        .nav-links {
            display: flex;
            gap: 35px;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .nav-links a {
            color: #e0e0e0;
            text-decoration: none;
            font-size: 1em;
            transition: color 0.3s ease;
            padding: 5px 0;
            position: relative;
        }

        .nav-links a:hover {
            color: #44a08d;
        }

        .menu-toggle {
            display: none;
            flex-direction: column;
            cursor: pointer;
        }

        .menu-toggle span {
            width: 25px;
            height: 3px;
            background: #44a08d;
            margin: 3px 0;
            transition: 0.3s;
        }


        /* WhatsApp Button */
        .whatsapp-float {
            position: fixed;
            width: 60px;
            height: 60px;
            bottom: 30px;
            right: 30px;
            background: #25D366;
            color: white;
            border-radius: 50%;
            text-align: center;
            font-size: 30px;
            box-shadow: 0 5px 20px rgba(37, 211, 102, 0.5);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            animation: pulse-whatsapp 2s infinite;
        }

        .whatsapp-float:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 30px rgba(37, 211, 102, 0.7);
        }

        @keyframes pulse-whatsapp {

            0%,
            100% {
                box-shadow: 0 5px 20px rgba(37, 211, 102, 0.5);
            }

            50% {
                box-shadow: 0 5px 30px rgba(37, 211, 102, 0.8);
            }
        }

        /* Smooth scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #0f2027;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #44a08d 0%, #093637 100%);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #44a08d;
        }

        /* Section transition animations */
        section {
            opacity: 0;
            animation: sectionFadeIn 0.8s ease forwards;
        }

        @keyframes sectionFadeIn {
            to {
                opacity: 1;
            }
        }

        /* Nav link active animation */
        .nav-links a {
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            width: 0;
            height: 2px;
            background: #44a08d;
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-download-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 25px;
            background: linear-gradient(135deg, #44a08d 0%, #093637 100%);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-size: 0.95em;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 3px 15px rgba(68, 160, 141, 0.3);
        }

        .nav-download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 25px rgba(68, 160, 141, 0.5);
        }

        .nav-download-btn .download-icon {
            font-size: 1.1em;
        }
        /* Scroll animations */
        .animate-on-scroll {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease;
        }

        .animate-on-scroll.animated {
            opacity: 1;
            transform: translateY(0);
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        /* Apply animations */
        .service-card {
            animation: fadeIn 0.6s ease forwards;
            animation-delay: calc(var(--index) * 0.1s);
        }

        .project-card {
            animation: fadeIn 0.6s ease forwards;
            animation-delay: calc(var(--index) * 0.1s);
        }

        .stat-box {
            animation: pulse 2s ease-in-out infinite;
            animation-delay: calc(var(--index) * 0.2s);
        }

        .contact-icon {
            animation: float 3s ease-in-out infinite;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .menu-toggle {
                display: flex;
            }

            .nav-right {
                display: none;
                position: absolute;
                top: 70px;
                left: 0;
                width: 100%;
                background: rgba(15, 32, 39, 0.98);
                flex-direction: column;
                padding: 20px;
                gap: 20px;
                align-items: stretch;
                box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
            }

            .nav-right.active {
                display: flex;
            }

            .nav-links {
                flex-direction: column;
                gap: 15px;
            }

            .nav-links a {
                padding: 10px;
                text-align: center;
            }

            .nav-download-btn {
                width: 100%;
                justify-content: center;
                padding: 12px 25px;
                font-size: 1em;
            }

            .home-content h1 {
                font-size: 2.5em;
            }

            .home-content h2 {
                font-size: 1.5em;
            }

            .home-buttons {
                flex-direction: column;
            }

            .about-container {
                grid-template-columns: 1fr;
                text-align: center;
                gap: 30px;
            }

            .about-text {
                order: 2;
            }

            .about-image {
                order: 1;
                margin-bottom: 20px;
            }

            .image-upload-container {
                width: 250px;
                height: 250px;
                margin: 0 auto;
            }

            .expertise-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .about-stats {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }

            .stat-box {
                padding: 25px 15px;
            }

            .stat-box h4 {
                font-size: 2em;
            }

            .services-grid {
                grid-template-columns: 1fr;
            }

            .contact-wrapper {
                grid-template-columns: 1fr;
                gap: 30px;
            }

            .projects-grid {
                grid-template-columns: 1fr;
            }

            .footer-content {
                grid-template-columns: 1fr;
            }

            .whatsapp-float {
                width: 50px;
                height: 50px;
                font-size: 25px;
                bottom: 20px;
                right: 20px;
            }
        }

        @media (max-width: 480px) {
            .logo {
                font-size: 1.2em;
            }

            .home-content h1 {
                font-size: 2em;
            }

            .home-content h2 {
                font-size: 1.2em;
            }

            .section-title {
                font-size: 2em;
            }

            .about-stats {
                grid-template-columns: 1fr;
            }

            .stat-box h4 {
                font-size: 1.8em;
            }

            .image-upload-container {
                width: 200px;
                height: 200px;
            }
        }
    </style>
</head>

<body>
    <!-- Navigation -->
    <nav>
        <div class="container">
            <div class="logo">DevPortfolio</div>
            <div class="menu-toggle" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="nav-right" id="navRight">
                <ul class="nav-links" id="navLinks">
                    <li><a href="#home">Home</a></li>
                    <li><a href="#about">About</a></li>
                    <li><a href="#services">Services</a></li>
                    <li><a href="#portfolio">Portfolio</a></li>
                    <li><a href="#portfolio">PROJECTS</a></li>
                    <li><a href="#contact">Contact</a></li>
                </ul>
                <a href="./AdnanNasirResume.pdf" class="nav-download-btn" download="AdnanNasirCV">
                    <span>Download CV</span>
                    <span class="download-icon"></span>
                </a>
            </div>
        </div>
    </nav>
    
    <!-- WhatsApp Float Button -->
    <a href="https://wa.me/923431740756?text=Hello!%20I'm%20interested%20in%20your%20services" class="whatsapp-float"
        target="_blank" title="Chat on WhatsApp">
        <i class="fa-brands fa-whatsapp"></i>
    </a>

    <script>
        // Mobile menu toggle
        function toggleMenu() {
            const navRight = document.getElementById('navRight');
            navRight.classList.toggle('active');
        }

        // Image upload functionality
        const imageInput = document.getElementById('imageInput');
        const imageContainer = document.getElementById('imageContainer');
        const previewImage = document.getElementById('previewImage');
        const uploadPlaceholder = document.getElementById('uploadPlaceholder');

        imageInput.addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    previewImage.src = e.target.result;
                    imageContainer.classList.add('has-image');
                };
                reader.readAsDataURL(file);
            }
        });

        // Download CV function
        function downloadCV(e) {
            e.preventDefault();
            // Create a dummy CV download
            alert('CV download will start shortly!\n\nNote: Replace this with your actual CV file link in the code.');
            // In production, replace the alert with actual download link:
            // window.location.href = 'path/to/your/cv.pdf';
        }

        // Smooth scrolling with animation
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    // Add animation class before scrolling
                    target.style.transform = 'scale(0.95)';
                    target.style.transition = 'transform 0.3s ease';

                    target.scrollIntoView({
                        behavior: 'smooth',
                        block: 'start'
                    });

                    // Reset animation
                    setTimeout(() => {
                        target.style.transform = 'scale(1)';
                    }, 300);

                    // Close mobile menu after clicking
                    const navRight = document.getElementById('navRight');
                    navRight.classList.remove('active');
                }
            });
        });

        // Active nav link on scroll
        window.addEventListener('scroll', () => {
            const sections = document.querySelectorAll('section');
            const navLinks = document.querySelectorAll('.nav-links a');

            let current = '';
            sections.forEach(section => {
                const sectionTop = section.offsetTop;
                const sectionHeight = section.clientHeight;
                if (scrollY >= sectionTop - 200) {
                    current = section.getAttribute('id');
                }
            });

            navLinks.forEach(link => {
                link.style.color = '#e0e0e0';
                if (link.getAttribute('href').slice(1) === current) {
                    link.style.color = '#44a08d';
                }
            });
        });
        // Form submission
        function handleSubmit(e) {
            e.preventDefault();

            const formMessage = document.getElementById('formMessage');
            const form = document.getElementById('contactForm');

            // Get form values
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const subject = document.getElementById('subject').value;
            const message = document.getElementById('message').value;

            // Simulate form submission
            formMessage.className = 'form-message success';
            formMessage.textContent = `Thank you, ${name}! Your message has been sent successfully. I'll get back to you soon.`;

            // Reset form
            form.reset();

            // Hide message after 5 seconds
            setTimeout(() => {
                formMessage.style.display = 'none';
            }, 5000);
        }

        // Scroll animations
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('animated');
                }
            });
        }, observerOptions);

        // Add animation to cards with delay
        document.addEventListener('DOMContentLoaded', () => {
            // Animate service cards
            const serviceCards = document.querySelectorAll('.service-card');
            serviceCards.forEach((card, index) => {
                card.style.setProperty('--index', index);
                card.classList.add('animate-on-scroll');
                observer.observe(card);
            });

            // Animate project cards
            const projectCards = document.querySelectorAll('.project-card');
            projectCards.forEach((card, index) => {
                card.style.setProperty('--index', index);
                card.classList.add('animate-on-scroll');
                observer.observe(card);
            });

            // Animate stat boxes
            const statBoxes = document.querySelectorAll('.stat-box');
            statBoxes.forEach((box, index) => {
                box.style.setProperty('--index', index);
            });

            // Animate contact items
            const contactItems = document.querySelectorAll('.contact-item');
            contactItems.forEach((item, index) => {
                item.classList.add('animate-on-scroll');
                item.style.animationDelay = `${index * 0.2}s`;
                observer.observe(item);
            });
        });
    </script>
</body>
</html>
